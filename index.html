<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Ranstock 測試版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; background:#0a0e14; color:#ddd; font-family:"Noto Sans TC",sans-serif; }
  .header { background:#121821; padding:15px; text-align:center; font-size:18px; font-weight:700; }
  table { width:100%; border-collapse:collapse; }
  td, th { padding:12px 8px; border-bottom:1px solid #333; }
  .up { color:#ff2d3d; } .down { color:#00d96b; }
</style>
</head>
<body>
<div class="header">Ranstock 狙擊手紀律系統 - 測試版</div>

<input id="search" placeholder="輸入代碼 如 2401 2330" style="width:100%;padding:12px;font-size:16px;">

<table id="list"><thead><tr><th>代碼</th><th>名稱</th><th>現價</th><th>漲幅</th></tr></thead><tbody></tbody></table>

<script>
// 測試資料
const stocks = [
  {code:"2401",name:"凌陽",price:142.8,prev:139.5},
  {code:"3601",name:"智晶半導體",price:78.68,prev:76.9},
  {code:"2330",name:"台積電",price:2270,prev:2220},
  {code:"3030",name:"德律",price:68.5,prev:67.8}
];

function render() {
  let html = '';
  stocks.forEach(s => {
    const chg = ((s.price - s.prev)/s.prev*100).toFixed(2);
    html += `<tr><td>${s.code}</td><td>${s.name}</td><td>${s.price}</td><td class="${chg>0?'up':'down'}">${chg>0?'▲':''}${chg}%</td></tr>`;
  });
  document.querySelector('#list tbody').innerHTML = html;
}
render();

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toUpperCase();
  // 簡易過濾
  const filtered = stocks.filter(s => s.code.includes(q) || s.name.includes(q));
  // 這裡可再擴充...
  render();
});
</script>
</body>
</html>
